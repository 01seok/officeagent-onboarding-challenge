services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - UPLOAD_DIR=/app/uploads
      - DOC_STORE_PATH=/app/data/documents.json
      - CODEX_MODEL=gpt-5.4
      - CODEX_SANDBOX=read-only
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      # Codex CLI 인증 정보 마운트 (호스트의 ChatGPT/Codex 인증 사용)
      - ~/.codex:/root/.codex:ro
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
